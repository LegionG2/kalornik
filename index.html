<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Kalornik</title>
  <meta name="theme-color" content="#0b0c10" />
  <meta name="description" content="Kalornik — prosty notatnik kalorii, makroskładników i produktów z obsługą EAN." />
  <!-- Favicon (SVG, lekki) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 256 256'%3E%3Crect width='256' height='256' rx='56' fill='%230b0c10'/%3E%3Crect x='20' y='20' width='216' height='216' rx='44' fill='%2334d399'/%3E%3Ctext x='50%25' y='60%25' text-anchor='middle' font-family='Arial,Helvetica,sans-serif' font-size='140' fill='white'%3EK%3C/text%3E%3C/svg%3E" />
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
  <style>
    :root{
      --bg:#0b0c10;--card:#12141a;--muted:#9aa3b2;--text:#e8eef5;--accent:#4ade80;--danger:#ef4444;--brand:#3b82f6;--border:#1f2430;
      --gap:14px;--radius:14px;--shadow:0 6px 20px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,Segoe UI,Roboto,Inter,Arial,sans-serif;background:var(--bg);color:var(--text);}  
    header{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,rgba(11,12,16,.95),rgba(11,12,16,.8));backdrop-filter:blur(8px);border-bottom:1px solid var(--border)}
    .bar{max-width:920px;margin:0 auto;padding:10px calc(env(safe-area-inset-left) + 12px) 10px calc(env(safe-area-inset-right) + 12px);display:flex;gap:10px;align-items:center}
    .title{font-weight:700;letter-spacing:.2px}
    .spacer{flex:1}
    .btn{appearance:none;border:1px solid var(--border);background:var(--card);color:var(--text);padding:10px 12px;border-radius:12px;font-weight:600;font-size:14px;line-height:1;display:inline-flex;align-items:center;gap:8px;box-shadow:var(--shadow);}
    .btn:active{transform:translateY(1px)}
    .btn.primary{background:var(--brand);border-color:transparent;color:white}
    .btn.ghost{background:transparent}

    main{max-width:920px;margin:0 auto;padding:18px 12px 26vh}

    .grid{display:grid;gap:var(--gap)}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}

    .targets{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap)}
    .target{display:flex;flex-direction:column;gap:8px}
    .row{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}

    .progress{height:14px;background:#0e1117;border:1px solid var(--border);border-radius:999px;overflow:hidden}
    .progress>i{display:block;height:100%;background:linear-gradient(90deg,#34d399,#10b981);width:0%}
    .progress.over>i{background:linear-gradient(90deg,#ef4444,#dc2626)}

    .muted{color:var(--muted);font-size:12px}

    .list{display:grid;gap:10px}
    .item{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
    .item h4{margin:0;font-size:15px}
    .item .meta{font-size:12px;color:var(--muted)}
    .chip{font-size:12px;padding:6px 8px;border:1px solid var(--border);border-radius:999px}
    .danger{color:#ffb4b4}
    .overdiff{color:var(--danger);font-weight:700;margin-left:6px}

    .tabs{display:flex;gap:8px}

    dialog{border:none;padding:0;border-radius:18px;max-width:min(520px,92vw);width:100%;background:var(--card);color:var(--text);box-shadow:var(--shadow)}
    dialog::backdrop{background:rgba(0,0,0,.5)}
    .modal{display:grid;gap:12px;padding:16px;border:1px solid var(--border);border-radius:18px}
    .modal header{position:sticky;top:0;background:transparent;border:0;backdrop-filter:none}
    .modal h3{margin:0 0 8px 0}
    .fields{display:grid;gap:10px}
    label{font-size:12px;color:var(--muted)}
    input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:#0e1117;color:var(--text)}
    .actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}

    .footerbar{position:fixed;left:0;right:0;bottom:0;background:linear-gradient(0deg,rgba(11,12,16,.98),rgba(11,12,16,.86));border-top:1px solid var(--border);padding:10px 12px;display:flex;gap:8px;justify-content:space-between;align-items:center}
    .footerbar .btn{flex:1;justify-content:center}

    @media (min-width:700px){
      .targets{grid-template-columns:repeat(4,1fr)}
      .footerbar{position:sticky;bottom:auto}
    }
  .install-btn{position:fixed;right:16px;bottom:86px;z-index:20}
  .fields .row>div{min-width:110px}
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <div class="title">Kalornik</div>
      <div class="spacer"></div>
      <button class="btn" id="btnGoals">Cele</button>
      <button class="btn" id="btnScan">Skanuj</button>
      <button class="btn" id="btnAdd">Dodaj</button>
    </div>
  </header>

  <main class="grid">
    <section class="card" id="summary">
      <div class="row">
        <strong>Dzisiaj</strong>
        <span class="muted" id="todayLabel"></span>
      </div>
      <div class="targets" id="targets"></div>
    </section>

    <section class="card">
      <div class="row"><strong>Dzisiejsze wpisy</strong>
        <div class="tabs">
          <button class="btn ghost" id="btnFavs">Ulubione</button>
          <button class="btn ghost" id="btnHistory">Historia</button>
        </div>
      </div>
      <div class="list" id="entries"></div>
      <div class="row" id="totalsRow" style="margin-top:8px">
        <span class="muted">Suma</span>
        <div class="muted" id="totalsText">0 kcal • B 0 g • W 0 g • T 0 g</div>
      </div>
    </section>
  </main>

  <div class="footerbar">
    <button class="btn" id="btnQuickFav">Szybkie ulubione</button>
    <button class="btn primary" id="btnQuickAdd">Dodaj pozycję</button>
  </div>
  <button class="btn install-btn" id="btnInstall" style="display:none">Zainstaluj</button>

  <!-- Modale -->
  <dialog id="modalGoals">
    <form class="modal" method="dialog">
      <h3>Ustaw cele dzienne</h3>
      <div class="fields">
        <div>
          <label>Kalorie / dzień</label>
          <input id="goalKcal" type="number" inputmode="numeric" min="0" step="1" placeholder="np. 2400" />
        </div>
        <div class="row">
          <div style="flex:1"><label>Białko (g)</label><input id="goalProt" type="number" min="0" step="1" placeholder="np. 160"></div>
          <div style="flex:1"><label>Węglowodany (g)</label><input id="goalCarb" type="number" min="0" step="1" placeholder="np. 260"></div>
          <div style="flex:1"><label>Tłuszcz (g)</label><input id="goalFat" type="number" min="0" step="1" placeholder="np. 70"></div>
        </div>
      </div>
      <div class="actions">
        <button class="btn" value="cancel">Anuluj</button>
        <button class="btn primary" id="saveGoals" value="default">Zapisz</button>
      </div>
    </form>
  </dialog>

  <dialog id="modalAdd">
    <form class="modal" method="dialog">
      <h3 id="addModalTitle">Dodaj pozycję ręcznie</h3>
      <div class="fields">
        <div><label>Nazwa</label><input id="addName" placeholder="np. Bułka grahamka"></div>
        <div class="row">
          <div style="flex:1"><label>kcal / 100 g</label><input id="addKcal100" type="number" step="1" min="0"></div>
          <div style="flex:1"><label>Białko / 100 g</label><input id="addProt100" type="number" step="0.1" min="0"></div>
          <div style="flex:1"><label>Węglowodany / 100 g</label><input id="addCarb100" type="number" step="0.1" min="0"></div>
          <div style="flex:1"><label>Tłuszcz / 100 g</label><input id="addFat100" type="number" step="0.1" min="0"></div>
        </div>
        <div><label>Porcja (g)</label><input id="addPortion" type="number" step="1" min="0" placeholder="np. 70"></div>
        <button class="btn" id="btnRecalc" type="button">Przelicz</button>
        <div class="muted" id="calcPreview">Makra porcji pojawią się tutaj…</div>
      </div>
      <div class="actions">
        <button class="btn" value="cancel">Anuluj</button>
        <button class="btn" id="btnSaveFav" type="button">Zapisz do ulubionych</button>
        <button class="btn primary" id="btnAddEntry" value="default">Dodaj do dnia</button>
      </div>
    </form>
  </dialog>

  <dialog id="modalFavs">
    <form class="modal" method="dialog">
      <h3>Ulubione</h3>
      <div id="favList" class="list"></div>
      <div class="actions"><button class="btn" value="cancel">Zamknij</button></div>
    </form>
  </dialog>

  <dialog id="modalHistory">
    <form class="modal" method="dialog">
      <h3>Historia</h3>
      <div id="historyList" class="list"></div>
      <div class="actions"><button class="btn" value="cancel">Zamknij</button></div>
    </form>
  </dialog>

  <dialog id="modalScan">
    <form class="modal" method="dialog">
      <h3>Skaner EAN</h3>
      <div class="fields">
        <video id="video" playsinline autoplay muted style="width:100%;border-radius:12px;background:#0e1117;aspect-ratio:3/4"></video>
        <div class="row"><span class="muted">Jeśli skaner nie działa, wpisz kod EAN ręcznie.</span></div>
        <div class="row">
          <input id="eanManual" placeholder="np. 5901234567890" inputmode="numeric" pattern="[0-9]*">
          <button class="btn" id="btnLookup" type="button">Szukaj</button>
        </div>
        <div id="scanStatus" class="muted">Status: czekam…</div>
        <div id="scanResult" class="fields" style="display:none">
          <div class="row"><strong id="prodName">Produkt</strong><span class="chip" id="prodCode">EAN</span></div>
          <div class="row">
            <div style="flex:1"><label>kcal / 100 g</label><input id="offKcal100" type="number" step="1"></div>
            <div style="flex:1"><label>Białko / 100 g</label><input id="offProt100" type="number" step="0.1"></div>
            <div style="flex:1"><label>Węglowodany / 100 g</label><input id="offCarb100" type="number" step="0.1"></div>
            <div style="flex:1"><label>Tłuszcz / 100 g</label><input id="offFat100" type="number" step="0.1"></div>
          </div>
          <div><label>Porcja (g)</label><input id="offPortion" type="number" step="1" min="0" placeholder="np. 250"></div>
          <button class="btn" id="btnRecalcOFF" type="button">Przelicz</button>
          <div class="muted" id="offPreview">Makra porcji pojawią się tutaj…</div>
        </div>
      </div>
      <div class="actions">
        <button class="btn" id="btnStopCam" type="button">Zatrzymaj kamerę</button>
        <button class="btn" value="cancel">Zamknij</button>
        <button class="btn primary" id="btnAddFromOFF" value="default" disabled>Dodaj do dnia</button>
      </div>
    </form>
  </dialog>

  <script>
  // === Storage helpers ===
  const store = {
    load(){ return JSON.parse(localStorage.getItem('kcal-notes')||'{}'); },
    save(data){ localStorage.setItem('kcal-notes', JSON.stringify(data)); },
    init(){ const s=this.load(); if(!s.goals) s.goals={kcal:0,prot:0,carb:0,fat:0}; if(!s.favs) s.favs=[]; if(!s.entries) s.entries={}; this.save(s); return s; }
  };

  // === Global state ===
  const state = { s: store.init(), stream:null, detector:null, anim:null, zxing:null, detected:false, fallbackTimer:null, editingId:null };
  const todayISO = () => {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  };

  // === UI refs ===
  const refs = {
    targets: document.getElementById('targets'), todayLabel: document.getElementById('todayLabel'),
    entries: document.getElementById('entries'), totalsText: document.getElementById('totalsText'),
    // modals
    dlgGoals: document.getElementById('modalGoals'), dlgAdd: document.getElementById('modalAdd'), dlgFavs: document.getElementById('modalFavs'), dlgHist: document.getElementById('modalHistory'), dlgScan: document.getElementById('modalScan'),
    // goals inputs
    goalK: document.getElementById('goalKcal'), goalP: document.getElementById('goalProt'), goalC: document.getElementById('goalCarb'), goalF: document.getElementById('goalFat'),
    // add manual
    addTitle: document.getElementById('addModalTitle'), addBtn: document.getElementById('btnAddEntry'), addName: document.getElementById('addName'), addK: document.getElementById('addKcal100'), addP: document.getElementById('addProt100'), addC: document.getElementById('addCarb100'), addF: document.getElementById('addFat100'), addPortion: document.getElementById('addPortion'), calcPreview: document.getElementById('calcPreview'),
    // favs & history
    favList: document.getElementById('favList'), histList: document.getElementById('historyList'),
    // scan
    video: document.getElementById('video'), scanStatus: document.getElementById('scanStatus'), eanManual: document.getElementById('eanManual'), prodName: document.getElementById('prodName'), prodCode: document.getElementById('prodCode'), offK: document.getElementById('offKcal100'), offP: document.getElementById('offProt100'), offC: document.getElementById('offCarb100'), offF: document.getElementById('offFat100'), offPortion: document.getElementById('offPortion'), offPreview: document.getElementById('offPreview'), btnAddFromOFF: document.getElementById('btnAddFromOFF'), scanResult: document.getElementById('scanResult'),
  };

  // === Dialog helpers ===
  const supportsDialog = typeof HTMLDialogElement !== 'undefined' && 'showModal' in HTMLDialogElement.prototype;
  function openDialog(dlg){ if(supportsDialog){ dlg.showModal(); } else { dlg.setAttribute('open',''); dlg.style.position='fixed'; dlg.style.inset='10px'; dlg.style.margin='0 auto'; dlg.style.maxWidth='92vw'; document.body.style.overflow='hidden'; } }
  function closeDialog(dlg){ if(supportsDialog){ try{ dlg.close(); }catch(_){} } else { dlg.removeAttribute('open'); document.body.style.overflow=''; } }
  const isSecureContextLike = () => (location.protocol==='https:' || location.hostname==='localhost' || location.hostname==='127.0.0.1');

  // === Utils ===
  const clamp = (v,min,max)=>Math.max(min,Math.min(max,v));
  const n = (v)=> Number.isFinite(+v)? +v : 0;
  const fmt = (v,dec=0)=> (Number.isFinite(v)? v.toFixed(dec):'0');
  const esc = (value)=> String(value ?? '').replace(/[&<>"']/g, (ch)=>({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch]));
  const formatISODatePL = (dateISO)=>{
    const [y,m,d] = String(dateISO).split('-');
    return (y && m && d) ? `${d}.${m}.${y}` : dateISO;
  };
  function portionMacros(per100, grams){ const f = grams/100; return { kcal: Math.round(n(per100.kcal)*f), prot: +(n(per100.prot)*f).toFixed(1), carb: +(n(per100.carb)*f).toFixed(1), fat: +(n(per100.fat)*f).toFixed(1) }; }
  function ensureDay(dateISO){ const s=state.s; if(!s.entries[dateISO]) s.entries[dateISO]=[]; }

  // === Render ===
  function renderSummary(){
    refs.todayLabel.textContent = new Date().toLocaleDateString('pl-PL', {weekday:'long', day:'2-digit', month:'2-digit'});
    const goals = state.s.goals;
    const totals = getTotals(todayISO());
    refs.targets.innerHTML='';

    const blocks=[
      {key:'kcal',label:'Kalorie', val:totals.kcal, goal:goals.kcal, unit:'kcal', decimals:0},
      {key:'prot',label:'Białko', val:totals.prot, goal:goals.prot, unit:'g', decimals:1},
      {key:'carb',label:'Węglowodany', val:totals.carb, goal:goals.carb, unit:'g', decimals:1},
      {key:'fat', label:'Tłuszcz', val:totals.fat, goal:goals.fat, unit:'g', decimals:1},
    ];

    for(const b of blocks){
      const over = b.goal>0 && b.val>b.goal;
      const pct = b.goal>0 ? clamp((b.val/b.goal)*100,0,100) : 0;
      const diff = over ? (b.val - b.goal) : 0;
      const diffHtml = over ? `<span class="overdiff">(${fmt(diff, b.unit==='kcal'?0:1)})</span>` : '';
      const el=document.createElement('div');
      el.className='target';
      el.innerHTML=`<div class="row"><span>${b.label}</span><span class="muted">${fmt(b.val,b.decimals)} / ${fmt(b.goal,0)} ${b.unit}${diffHtml}</span></div>
      <div class="progress ${over?'over':''}"><i style="width:${pct}%"></i></div>`;
      refs.targets.appendChild(el);
    }

    refs.totalsText.textContent = `${fmt(totals.kcal)} kcal • B ${fmt(totals.prot,1)} g • W ${fmt(totals.carb,1)} g • T ${fmt(totals.fat,1)} g`;
  }
  function getTotals(dateISO){ const list = state.s.entries[dateISO]||[]; return list.reduce((acc,it)=>{ const m = portionMacros({kcal:it.kcal100,prot:it.prot100,carb:it.carb100,fat:it.fat100}, it.grams); acc.kcal += m.kcal; acc.prot += m.prot; acc.carb += m.carb; acc.fat += m.fat; return acc; }, {kcal:0,prot:0,carb:0,fat:0}); }
  function renderEntries(){
    const list = state.s.entries[todayISO()]||[];
    refs.entries.innerHTML='';
    if(!list.length){
      const p=document.createElement('div');
      p.className='muted';
      p.textContent='Brak wpisów na dziś. Dodaj produkt ręcznie, z ulubionych albo przez EAN.';
      refs.entries.appendChild(p);
      return;
    }
    for(const it of list){
      const m = portionMacros({kcal:it.kcal100,prot:it.prot100,carb:it.carb100,fat:it.fat100}, it.grams);
      const row=document.createElement('div');
      row.className='item';
      row.innerHTML=`<div><h4>${esc(it.name)}</h4><div class="meta">${fmt(n(it.grams),0)} g • ${m.kcal} kcal • B ${fmt(m.prot,1)} g • W ${fmt(m.carb,1)} g • T ${fmt(m.fat,1)} g</div></div><div class="row" style="gap:6px"><button class="btn" data-action="edit" data-id="${esc(it.id)}">Edytuj</button><button class="btn" data-action="del" data-id="${esc(it.id)}">Usuń</button></div>`;
      refs.entries.appendChild(row);
    }
  }

  function openGoals(){ const g=state.s.goals; refs.goalK.value=g.kcal||''; refs.goalP.value=g.prot||''; refs.goalC.value=g.carb||''; refs.goalF.value=g.fat||''; openDialog(refs.dlgGoals); }
  function openAdd(prefill){
    state.editingId = prefill?.id || null;
    refs.addTitle.textContent = state.editingId ? 'Edytuj pozycję' : 'Dodaj pozycję ręcznie';
    refs.addBtn.textContent = state.editingId ? 'Zapisz zmiany' : 'Dodaj do dnia';
    refs.addName.value = prefill?.name || '';
    refs.addK.value = prefill?.kcal100 ?? '';
    refs.addP.value = prefill?.prot100 ?? '';
    refs.addC.value = prefill?.carb100 ?? '';
    refs.addF.value = prefill?.fat100 ?? '';
    refs.addPortion.value = prefill?.grams ?? '';
    refs.calcPreview.textContent = 'Makra porcji pojawią się tutaj…';
    if(prefill?.grams) recalcManual();
    openDialog(refs.dlgAdd);
  }
  function recalcManual(){ const per100={kcal:n(refs.addK.value),prot:n(refs.addP.value),carb:n(refs.addC.value),fat:n(refs.addF.value)}; const grams=n(refs.addPortion.value); const m=portionMacros(per100, grams); refs.calcPreview.textContent = `${grams} g → ${m.kcal} kcal • B ${fmt(m.prot,1)} g • W ${fmt(m.carb,1)} g • T ${fmt(m.fat,1)} g`; }
  function addEntry(obj){
    ensureDay(todayISO());
    const it={ id:crypto.randomUUID?.() || String(Date.now()), ...obj };
    state.s.entries[todayISO()].push(it);
    store.save(state.s);
    renderEntries();
    renderSummary();
  }
  function upsertEntry(obj){
    ensureDay(todayISO());
    const list = state.s.entries[todayISO()];
    if(state.editingId){
      const i = list.findIndex(x=>x.id===state.editingId);
      if(i >= 0) list[i] = { ...list[i], ...obj };
      else addEntry(obj);
      state.editingId = null;
    } else {
      addEntry(obj);
      return;
    }
    store.save(state.s);
    renderEntries();
    renderSummary();
  }
  function saveGoals(){ state.s.goals={kcal:n(refs.goalK.value),prot:n(refs.goalP.value),carb:n(refs.goalC.value),fat:n(refs.goalF.value)}; store.save(state.s); renderSummary(); }
  function renderFavs(){
    refs.favList.innerHTML='';
    if(!state.s.favs.length){
      const p=document.createElement('div');
      p.className='muted';
      p.textContent='Brak ulubionych. Zapisz produkt z okna „Dodaj”.';
      refs.favList.appendChild(p);
      return;
    }
    for(const [idx,f] of state.s.favs.entries()){
      const d=document.createElement('div');
      d.className='item';
      d.innerHTML=`<div><h4>${esc(f.name)}</h4><div class="meta">100 g → ${fmt(n(f.kcal100),0)} kcal • B ${fmt(n(f.prot100),1)} g • W ${fmt(n(f.carb100),1)} g • T ${fmt(n(f.fat100),1)} g</div></div><div class="row" style="gap:6px"><button class="btn" data-action="use" data-idx="${idx}">Użyj</button><button class="btn" data-action="del" data-idx="${idx}">Usuń</button></div>`;
      refs.favList.appendChild(d);
    }
  }
  function openFavs(){ renderFavs(); openDialog(refs.dlgFavs); }
  function openHistory(){
    const dates=Object.keys(state.s.entries).sort().reverse();
    refs.histList.innerHTML='';
    if(!dates.length){
      const p=document.createElement('div');
      p.className='muted';
      p.textContent='Brak historii.';
      refs.histList.appendChild(p);
      openDialog(refs.dlgHist);
      return;
    }
    for(const d of dates){
      const t=getTotals(d);
      const g=state.s.goals;
      const ok = (g.kcal && t.kcal>=g.kcal*0.98 && t.kcal<=g.kcal*1.02) && (!g.prot || t.prot>=g.prot) && (!g.carb || t.carb<=g.carb) && (!g.fat || t.fat<=g.fat);
      const row=document.createElement('div');
      row.className='item';
      row.innerHTML=`<div><h4>${formatISODatePL(d)}</h4><div class="meta">${fmt(t.kcal)} kcal • B ${fmt(t.prot,1)} g • W ${fmt(t.carb,1)} g • T ${fmt(t.fat,1)} g</div></div><span class="chip ${ok?'':'danger'}">${ok?'✔ w celu':'◦ poza celem'}</span>`;
      refs.histList.appendChild(row);
    }
    openDialog(refs.dlgHist);
  }

  // === Scanner / OFF ===
  async function startCamera(){
    try{
      if(!navigator.mediaDevices?.getUserMedia){ refs.scanStatus.textContent = 'Twoja przeglądarka nie obsługuje kamery (brak getUserMedia).'; return false; }
      state.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } } });
      refs.video.srcObject = state.stream; await refs.video.play().catch(()=>{});
      if(refs.video.readyState < 2){ await new Promise(r=> refs.video.addEventListener('loadeddata', r, {once:true})); }
      refs.scanStatus.textContent = 'Kamera uruchomiona'; return true;
    }catch(e){ const msg = (e && e.name)? e.name : 'Brak dostępu do kamery'; refs.scanStatus.textContent = 'Błąd kamery: ' + msg + (isSecureContextLike()? '' : ' • Włącz HTTPS lub localhost'); return false; }
  }
  async function stopCamera(){
    if(state.fallbackTimer){ clearTimeout(state.fallbackTimer); state.fallbackTimer=null; }
    if(state.zxing){ try{ state.zxing.reset(); }catch(_){} state.zxing=null; }
    if(refs.video){ try{ refs.video.pause(); }catch(_){} refs.video.srcObject=null; }
    if(state.stream){ state.stream.getTracks().forEach(t=>t.stop()); state.stream=null; }
    if(state.anim){ cancelAnimationFrame(state.anim); state.anim=null; }
    state.detector=null;
  }
  async function runScanner(){
    const supported = 'BarcodeDetector' in window && await BarcodeDetector.getSupportedFormats?.().then(fs=>fs.includes('ean_13')||fs.includes('ean_8')).catch(()=>false);
    if(!supported){ refs.scanStatus.textContent = 'Brak wsparcia BarcodeDetector. Użyję fallbacku ZXing.'; await runZXingFallback(); return; }
    state.detector = new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e']});
    if(refs.video.readyState < 2){ refs.scanStatus.textContent = 'Czekam na obraz z kamery…'; await new Promise(r=> refs.video.addEventListener('loadeddata', r, {once:true})); }
    const detect = async()=>{
      if(!state.detector){ return; }
      try{
        const codes = await state.detector.detect(refs.video);
        if(codes?.length){ await handleCode(codes[0].rawValue); return; }
      }catch(e){ /* ignore frame */ }
      state.anim = requestAnimationFrame(detect);
    };
    state.anim = requestAnimationFrame(detect);
  }
  async function runZXingFallback(){
    try{
      refs.scanStatus.textContent = 'Uruchamiam fallback ZXing…';
      const lib = await import('https://cdn.jsdelivr.net/npm/@zxing/library@0.20.0/+esm');
      const codeReader = new lib.BrowserMultiFormatReader();
      state.zxing = codeReader;
      await codeReader.decodeFromVideoDevice(null, refs.video, (result)=>{
        if(result && !state.detected){
          try{ codeReader.reset(); }catch(_){ }
          if(state.anim){ cancelAnimationFrame(state.anim); state.anim=null; }
          state.detector=null;
          handleCode(result.getText(), {force:true});
        }
      });
      refs.scanStatus.textContent = 'Fallback ZXing działa. Skieruj kod EAN na środek.';
    }catch(e){
      refs.scanStatus.textContent = 'ZXing nie zadziałał. Użyj pola EAN.';
    }
  }
  async function openScan(){
    refs.scanResult.style.display='none';
    refs.offPreview.textContent='Makra porcji pojawią się tutaj…';
    refs.btnAddFromOFF.disabled=true;
    refs.scanStatus.textContent='Startuję skaner…';
    state.detected=false;
    openDialog(refs.dlgScan);
    if(!isSecureContextLike()){ refs.scanStatus.textContent='Skaner wymaga HTTPS lub localhost. Użyj pola EAN poniżej.'; return; }
    const camOk = await startCamera(); if(!camOk){ return; }
    await runScanner();
    // Po 5 s bez detekcji przełącz fallback ZXing
    if(!state.fallbackTimer){ state.fallbackTimer = setTimeout(()=>{ if(!state.detected && !state.zxing){ runZXingFallback(); } }, 5000); }
    if(!('BarcodeDetector' in window)){ refs.scanStatus.textContent='Twoja przeglądarka nie obsługuje BarcodeDetector. Próbuję fallbacku ZXing…'; }
    else { refs.scanStatus.textContent='Kamera gotowa. Skieruj kod EAN na środek kadru.'; }
  }
  async function handleCode(code, options={}){
    const cleanCode = String(code || '').replace(/\D/g,'');
    if(!cleanCode){ refs.scanStatus.textContent='Wpisz poprawny kod EAN.'; return; }
    if(state.detected && !options.force){ return; }
    state.detected = true;
    if(state.fallbackTimer){ clearTimeout(state.fallbackTimer); state.fallbackTimer=null; }
    if(state.anim){ cancelAnimationFrame(state.anim); state.anim=null; }
    state.detector=null;
    refs.scanStatus.textContent = `Znaleziono kod: ${cleanCode}. Pobieram z Open Food Facts…`;
    const data = await fetchOFF(cleanCode);
    if(!data){
      state.detected = false;
      refs.scanStatus.textContent='Nie znaleziono produktu w Open Food Facts. Wpisz dane ręcznie.';
      return;
    }
    const p = mapOFFProduct(data);
    showOFFProduct(p);
  }
  async function fetchOFF(code){ try{ const resp = await fetch(`https://world.openfoodfacts.org/api/v2/product/${code}.json`); const json = await resp.json(); if(json && (json.status===1 || json.product)) return json.product; return null; }catch(e){ return null; } }
  function mapOFFProduct(prod){ const nutr = prod.nutriments||{}; const kcal100 = n(nutr['energy-kcal_100g'] ?? nutr['energy-kcal_value'] ?? 0); return { name: prod.product_name || prod.generic_name || 'Produkt', code: prod.code || '', kcal100, prot100: n(nutr['proteins_100g']), carb100: n(nutr['carbohydrates_100g']), fat100: n(nutr['fat_100g']) }; }
  function showOFFProduct(p){ refs.scanResult.style.display='grid'; refs.prodName.textContent=p.name; refs.prodCode.textContent=p.code; refs.offK.value=p.kcal100||''; refs.offP.value=p.prot100||''; refs.offC.value=p.carb100||''; refs.offF.value=p.fat100||''; refs.offPortion.value=''; refs.btnAddFromOFF.disabled=false; refs.scanStatus.textContent='Załadowano z Open Food Facts'; }
  function recalcOFF(){ const per100={kcal:n(refs.offK.value),prot:n(refs.offP.value),carb:n(refs.offC.value),fat:n(refs.offF.value)}; const grams=n(refs.offPortion.value||0); const m=portionMacros(per100, grams); refs.offPreview.textContent = `${grams} g → ${m.kcal} kcal • B ${fmt(m.prot,1)} g • W ${fmt(m.carb,1)} g • T ${fmt(m.fat,1)} g`; }

  // === Events ===
  document.getElementById('btnGoals').addEventListener('click', openGoals);
  document.getElementById('btnScan').addEventListener('click', openScan);
  document.getElementById('btnAdd').addEventListener('click', ()=>openAdd());
  document.getElementById('btnQuickAdd').addEventListener('click', ()=>openAdd());
  document.getElementById('btnQuickFav').addEventListener('click', openFavs);
  document.getElementById('btnHistory').addEventListener('click', openHistory);
  document.getElementById('btnFavs').addEventListener('click', openFavs);
  document.getElementById('saveGoals').addEventListener('click', (e)=>{ e.preventDefault(); saveGoals(); closeDialog(refs.dlgGoals); });
  document.getElementById('btnRecalc').addEventListener('click', recalcManual);
  document.getElementById('btnAddEntry').addEventListener('click', (e)=>{ e.preventDefault(); const obj={ name: refs.addName.value.trim()||'Pozycja', grams: n(refs.addPortion.value), kcal100:n(refs.addK.value), prot100:n(refs.addP.value), carb100:n(refs.addC.value), fat100:n(refs.addF.value) }; if(obj.grams<=0){alert('Podaj gramaturę.');return} upsertEntry(obj); closeDialog(refs.dlgAdd); });
  document.getElementById('btnSaveFav').addEventListener('click', ()=>{ const fav={name:refs.addName.value.trim()||'Pozycja',kcal100:n(refs.addK.value),prot100:n(refs.addP.value),carb100:n(refs.addC.value),fat100:n(refs.addF.value)}; if(!(fav.kcal100||fav.prot100||fav.carb100||fav.fat100)){alert('Uzupełnij wartości dla 100 g');return} state.s.favs.push(fav); store.save(state.s); alert('Zapisano w ulubionych'); });
  refs.favList.addEventListener('click',(e)=>{ const t=e.target.closest('button'); if(!t) return; const idx=+t.dataset.idx; if(t.dataset.action==='del'){ state.s.favs.splice(idx,1); store.save(state.s); renderFavs(); } if(t.dataset.action==='use'){ const f=state.s.favs[idx]; closeDialog(refs.dlgFavs); openAdd({name:f.name,kcal100:f.kcal100,prot100:f.prot100,carb100:f.carb100,fat100:f.fat100}); } });
  refs.entries.addEventListener('click',(e)=>{ const btn=e.target.closest('button'); if(!btn) return; const id=btn.dataset.id; const list=state.s.entries[todayISO()]||[]; const i=list.findIndex(x=>x.id===id); if(i<0) return; if(btn.dataset.action==='del'){ list.splice(i,1); store.save(state.s); renderEntries(); renderSummary(); } if(btn.dataset.action==='edit'){ const it=list[i]; openAdd({id:it.id,name:it.name,kcal100:it.kcal100,prot100:it.prot100,carb100:it.carb100,fat100:it.fat100,grams:it.grams}); } });
  document.getElementById('btnLookup').addEventListener('click', ()=>{ const code = refs.eanManual.value.trim(); if(!code) return; state.detected=false; handleCode(code, {force:true}); });
  document.getElementById('btnRecalcOFF').addEventListener('click', recalcOFF);
  document.getElementById('btnAddFromOFF').addEventListener('click',(e)=>{ e.preventDefault(); const grams=n(refs.offPortion.value); if(grams<=0){alert('Podaj gramaturę porcji.');return} addEntry({ name: refs.prodName.textContent, grams, kcal100:n(refs.offK.value), prot100:n(refs.offP.value), carb100:n(refs.offC.value), fat100:n(refs.offF.value) }); closeDialog(refs.dlgScan); stopCamera(); });
  document.getElementById('btnStopCam').addEventListener('click', stopCamera);
  refs.dlgAdd.addEventListener('close', ()=>{ state.editingId=null; refs.addBtn.textContent='Dodaj do dnia'; refs.addTitle.textContent='Dodaj pozycję ręcznie'; });
  refs.dlgScan.addEventListener('close', stopCamera);

  // === PWA: SW register + A2HS ===
  async function registerServiceWorker(){
    if('serviceWorker' in navigator){
      try{ await navigator.serviceWorker.register('./sw.js', {scope:'./'}); }
      catch(e){ console.log('SW register failed:', e); }
    }
  }
  let deferredPrompt=null; const btnInstall=document.getElementById('btnInstall');
  window.addEventListener('beforeinstallprompt',(e)=>{ e.preventDefault(); deferredPrompt=e; btnInstall.style.display='inline-flex';});
  btnInstall.addEventListener('click', async()=>{ if(!deferredPrompt) return; deferredPrompt.prompt(); try{ await deferredPrompt.userChoice; }catch(_){} deferredPrompt=null; btnInstall.style.display='none';});

  // === Init ===
  function init(){ ensureDay(todayISO()); renderEntries(); renderSummary(); registerServiceWorker(); }
  if(document.readyState==='loading'){ document.addEventListener('DOMContentLoaded', init); } else { init(); }
</script>
